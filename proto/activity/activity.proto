syntax = "proto3";

package activity;

option go_package = "github.com/mas-soft/masflow-sdk/internal/pb/activity";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

// ============================================================
// Module — a named group of activities from a single provider
// ============================================================

message Module {
  string name = 1;
  string description = 2;
  string version = 3;
  string icon = 4;
  ModuleMetadata metadata = 5;
  repeated ActivityDefinition activities = 6;
  string task_queue = 7;
}

message ModuleMetadata {
  string author = 1;
  string documentation_url = 2;
  string repository_url = 3;
  repeated string tags = 4;
  string category = 5;
  map<string, string> labels = 6;
  google.protobuf.Timestamp registered_at = 7;
}

// ============================================================
// ActivityDefinition — describes a single activity's contract
// ============================================================

message ActivityDefinition {
  string name = 1;
  string description = 2;
  string icon = 3;
  string input_type_url = 4;
  string output_type_url = 5;
  string input_schema = 6;
  string output_schema = 7;
  bool supports_async = 8;
  string task_queue = 9;
  ActivityMetadata metadata = 10;
}

message ActivityMetadata {
  string documentation_url = 1;
  repeated string tags = 2;
  string category = 3;
  string version = 4;
  map<string, string> labels = 5;
}

// ============================================================
// Async callback context
// ============================================================

message AsyncCallbackContext {
  string workflow_id = 1;
  string run_id = 2;
  string callback_signal = 3;
  string callback_timeout = 4;
}

// ============================================================
// ModuleRegistry service
// ============================================================

service ModuleRegistry {
  rpc RegisterModule(RegisterModuleRequest) returns (RegisterModuleResponse);
  rpc UnregisterModule(UnregisterModuleRequest) returns (UnregisterModuleResponse);
  rpc ListModules(ListModulesRequest) returns (ListModulesResponse);
  rpc GetModule(GetModuleRequest) returns (GetModuleResponse);
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
  rpc GetActivity(GetActivityRequest) returns (GetActivityResponse);
}

// ============================================================
// ActivityExecutor service — BPM calls external modules
// ============================================================

service ActivityExecutor {
  rpc Execute(ExecuteActivityRequest) returns (ExecuteActivityResponse);
}

// ---- Registry RPCs ----

message RegisterModuleRequest {
  Module module = 1;
}

message RegisterModuleResponse {
  string module_name = 1;
  repeated string registered_activities = 2;
  string temporal_address = 3;
  string temporal_namespace = 4;
  // True if an existing module with the same name was replaced.
  bool replaced = 5;
}

message UnregisterModuleRequest {
  string module_name = 1;
}

message UnregisterModuleResponse {}

message ListModulesRequest {}

message ListModulesResponse {
  repeated Module modules = 1;
}

message GetModuleRequest {
  string module_name = 1;
}

message GetModuleResponse {
  Module module = 1;
}

message ListActivitiesRequest {
  string module_name = 1;
  string category = 2;
}

message ListActivitiesResponse {
  repeated ActivityDefinition activities = 1;
}

message GetActivityRequest {
  string module_name = 1;
  string activity_name = 2;
}

message GetActivityResponse {
  ActivityDefinition activity = 1;
  string module_name = 2;
}

// ---- Executor RPCs ----

message ExecuteActivityRequest {
  string module_name = 1;
  string activity_name = 2;
  google.protobuf.Any input = 3;
  map<string, string> metadata = 4;
  AsyncCallbackContext async_context = 5;
}

message ExecuteActivityResponse {
  google.protobuf.Any output = 1;
  string error = 2;
}
