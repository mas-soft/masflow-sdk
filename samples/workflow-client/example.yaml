name: hello-world
description: A simple demo workflow

steps:
  - name: greet
    type: activity
    activity:
      type: greet
      module: greeter
      args:
        name: "World"
      ref: greeting

  - name: log-greeting
    type: activity
    activity:
      type: logNotification
      module: greeter
      args:
        message: "Greeting sent: ${greeting.message}"
        level: "info"
